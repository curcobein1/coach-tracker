<div class="wrap">
  <div class="header">
    <h2>Plan</h2>
  </div>

  <p-card>
    <div class="field">
      <label class="label mb-2 block">Split</label>
      <p-select 
        [options]="splits" 
        [(ngModel)]="selectedSplit" 
        optionLabel="name" 
        placeholder="-- Select split --" 
        (onChange)="onSelectSplit($event.value?.id)">
      </p-select>
    </div>
  </p-card>

  <div *ngIf="loading" class="muted mt-4">Loading...</div>

  <p-card *ngIf="selectedSplit && !loading" styleClass="mt-4">
    <div class="label mb-2">Days</div>
    <div class="flex flex-wrap gap-2">
      <p-button
        *ngFor="let d of selectedSplit.days"
        [label]="d.name + ' (' + d.exercises.length + ')'"
        [severity]="selectedDay?.id === d.id ? 'primary' : 'secondary'"
        (onClick)="selectDay(d)">
      </p-button>
    </div>

    <div *ngIf="selectedDay" class="mt-4">
      <p-button label="Assign this day to today" (onClick)="assignDayToToday()" severity="success"></p-button>
      <div class="sub mt-2">Today is {{ todayKey }}. This sets what shows on the Today page.</div>

      <div class="mt-4">
        <div *ngIf="selectedDay.exercises.length === 0" class="muted">No exercises on this day. Add from exercise library (coming soon).</div>
        <div *ngFor="let ex of selectedDay.exercises" class="item">
          <div class="left">
            <span>{{ ex.exerciseName }}</span>
            <span class="meta">{{ ex.targetSets }} sets · {{ ex.targetRepRange || '-' }}</span>
          </div>
          <p-button icon="pi pi-times" severity="danger" [rounded]="true" [text]="true" (onClick)="removeExercise(ex)"></p-button>
        </div>
      </div>
    </div>
  </p-card>

  <div *ngIf="error" class="err">{{ error }}</div>
</div>
