<div class="card">
  <h2>Baselines</h2>
  <p class="sub">Enter baseline set (kg × reps @ RIR). This seeds your averages.</p>

  <div class="grid">
    <input class="input" asciiOnly placeholder="Exercise (Bench Press)" [(ngModel)]="name" />
    <input class="input" asciiOnly type="number" placeholder="kg" [(ngModel)]="kg" />
    <input class="input" asciiOnly type="number" placeholder="reps" [(ngModel)]="reps" />
    <input class="input" asciiOnly type="number" placeholder="RIR" [(ngModel)]="rir" />
    <button class="btn" (click)="addOrUpdate()">Save</button>
  </div>
</div>

<div class="card" *ngIf="stats.list().length === 0">
  <p class="sub">No baselines yet.</p>
</div>

<div class="card" *ngFor="let s of stats.list()">
  <div class="row">
    <b>{{ s.exerciseName }}</b>
    <button class="btn ghost" (click)="remove(s.exerciseName)">Remove</button>
  </div>
  <div class="sub">
    Baseline: {{ s.baseline.kg }}×{{ s.baseline.reps }} @RIR{{ s.baseline.rir }}
    • Baseline e1RM: {{ s.baselineE1RM }}
    • Current Avg e1RM: {{ s.currentAvgE1RM }}
  </div>
</div>
