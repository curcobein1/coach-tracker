<div class="shell">
  <aside class="sidebar">
    <div class="brand">Coach Tracker</div>

    <nav class="nav">
      <a routerLink="/today" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Today</a>
      <a routerLink="/plan" routerLinkActive="active">Plan</a>
      <a routerLink="/nutrition" routerLinkActive="active">Nutrition</a>
      <a routerLink="/settings" routerLinkActive="active">Settings</a>
    </nav>
  </aside>

  <main class="main">
    <button
      style="position:fixed; bottom:12px; right:12px; z-index:9999; padding:8px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.5); color:#fff; cursor:pointer;"
      (click)="syncToBackend()"
      title="One-time: save localStorage to DB"
    >
      Sync to DB
    </button>
    <router-outlet></router-outlet>
  </main>
</div>
